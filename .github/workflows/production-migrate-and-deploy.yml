name: Production migrate and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

# A migration must never be interrupted or overlap another production migration.
concurrency:
  group: production-migrate-and-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  migrate-and-deploy:
    name: Migrate Neon, then deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply pending Prisma migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # This path is deliberately after the migration. Do not enable a parallel
      # Vercel Git deployment for main, or it can race this serialized workflow.
      - name: Pull Vercel production configuration
        run: npx --yes vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build production deployment
        run: npx --yes vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy production build
        run: npx --yes vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

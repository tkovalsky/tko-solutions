name: Production migrate and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

# A migration must never be interrupted or overlap another production migration.
concurrency:
  group: production-migrate-and-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  migrate-and-deploy:
    name: Migrate Neon, then deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Verify required secrets are present
        run: |
          missing=0
          for name in DATABASE_URL VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required secret: $name (set it under Settings -> Environments -> production)"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "One or more required secrets are not set for the 'production' environment."
            exit 1
          fi
          echo "All required secrets present."
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Install dependencies
        run: npm ci

      # Neon note: migrations must run against a DIRECT (non-pooled) connection.
      # A pooled "-pooler" endpoint can break `migrate deploy` (advisory locks /
      # prepared statements over PgBouncer). Set a DIRECT_URL secret to the
      # direct Neon endpoint; it falls back to DATABASE_URL if unset.
      - name: Apply pending Prisma migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL != '' && secrets.DIRECT_URL || secrets.DATABASE_URL }}

      # This path is deliberately after the migration. Do not enable a parallel
      # Vercel Git deployment for main, or it can race this serialized workflow.
      - name: Pull Vercel production configuration
        run: npx --yes vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build production deployment
        run: npx --yes vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy production build
        run: npx --yes vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
